name: Setup Bun Monorepo
description: >
  Install Bun, restore Bun install cache, and optionally restore the Turbo task
  cache. Consolidates the common setup steps used across every CI job into a
  single composite action so the YAML workflow stays anchor-free (GitHub Actions
  does not support YAML anchors). NOTE: actions/checkout must be run by each
  consuming job BEFORE this composite, since local composite actions cannot be
  loaded until the repo is checked out.

inputs:
  turbo-cache:
    description: 'Restore the .turbo task cache in addition to the Bun install cache.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: 1.3.11

    - name: Restore Bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', '.github/workflows/ci.yml', 'turbo.json') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Restore Turbo task cache
      if: inputs.turbo-cache == 'true'
      uses: actions/cache@v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock', '.github/workflows/ci.yml', 'turbo.json') }}
        restore-keys: turbo-${{ runner.os }}-
