name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # release runs must complete; do not cancel

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Fix stale bun.lock after release
        if: ${{ steps.release.outputs.releases_created }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile || true
        if: ${{ steps.release.outputs.releases_created }}

      - run: bun install
        if: ${{ steps.release.outputs.releases_created }}

      - name: Commit updated bun.lock
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          git config user.name "release-please[bot]"
          git config user.email "release-please[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: update bun.lock after release" || echo "No changes to commit"
          # SECURITY NOTE: GITHUB_TOKEN cannot push to branches protected by branch protection rules.
          # If main has branch protection enabled, this push will fail with a 403.
          # Solution: create a GitHub App or PAT with bypass permissions and pass it as
          # secrets.RELEASE_PAT, then replace the token above with:
          #   token: ${{ secrets.RELEASE_PAT }}
          # See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
          git push
