name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "24 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: openai
          OPENAI_BASE_URL: https://litellm-production-6261.up.railway.app/v1
          OPENAI_API_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          OPENWIKI_MODEL_ID: fast

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          # No add-paths: `git add -- openwiki ...` is fatal when one of
          # openwiki/, AGENTS.md, or CLAUDE.md hasn't been created or
          # touched this run (see SolenixInc/the-library#7). The action's
          # default (git add -A) stages exactly what the openwiki step
          # touched, since the checkout is otherwise clean.
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
