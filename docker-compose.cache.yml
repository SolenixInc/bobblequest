services:
  redis:
    image: bitnami/redis:7.4
    environment:
      REDIS_PASSWORD: redispassword
      REDIS_AOF_ENABLED: "yes"
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/bitnami/redis/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redispassword ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redisdata:
